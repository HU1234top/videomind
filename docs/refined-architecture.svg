<svg viewBox="0 0 680 840" width="100%" role="img" aria-labelledby="title desc" style="font-family: system-ui, -apple-system, sans-serif;">
  <title id="title">VideoMind 改进版架构流程图</title>
  <desc id="desc">从浏览器复用到知识库输出的五层流水线，包含采集容错、状态检查点、多模型分析、质量校验与知识图谱构建。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background layer bands -->
  <rect x="30" y="20" width="620" height="90" rx="12" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <rect x="30" y="125" width="620" height="110" rx="12" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <rect x="30" y="250" width="620" height="100" rx="12" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <rect x="30" y="365" width="620" height="110" rx="12" fill="#FBEAF0" stroke="#D4537E" stroke-width="0.5"/>
  <rect x="30" y="490" width="620" height="130" rx="12" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
  <rect x="30" y="635" width="620" height="90" rx="12" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>

  <!-- Layer labels -->
  <text x="50" y="42" font-size="13" font-weight="500" fill="#0C447C">layer 0 · 浏览器会话</text>
  <text x="50" y="147" font-size="13" font-weight="500" fill="#085041">layer 1 · 采集层（带容错）</text>
  <text x="50" y="272" font-size="13" font-weight="500" fill="#633806">layer 2 · 编排调度</text>
  <text x="50" y="387" font-size="13" font-weight="500" fill="#72243E">layer 3 · 多模型分析（含审查）</text>
  <text x="50" y="512" font-size="13" font-weight="500" fill="#3C3489">layer 4 · 知识构建（深度结构化）</text>
  <text x="50" y="657" font-size="13" font-weight="500" fill="#27500A">layer 5 · 知识库输出</text>

  <!-- Layer 0: Browser -->
  <g transform="translate(180, 60)">
    <rect x="0" y="0" width="320" height="40" rx="8" fill="#ffffff" stroke="#185FA5" stroke-width="0.5"/>
    <text x="160" y="20" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#042C53">chrome --remote-debugging-port=9222 · 复用已登录 profile</text>
  </g>

  <!-- Layer 1: Collector -->
  <g transform="translate(70, 180)">
    <rect x="0" y="0" width="130" height="40" rx="8" fill="#ffffff" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="65" y="20" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#04342C">抖音 adapter</text>
  </g>
  <g transform="translate(220, 180)">
    <rect x="0" y="0" width="130" height="40" rx="8" fill="#ffffff" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="65" y="20" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#04342C">b站 adapter</text>
  </g>
  <g transform="translate(370, 180)">
    <rect x="0" y="0" width="130" height="40" rx="8" fill="#ffffff" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="65" y="20" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#04342C">youtube adapter</text>
  </g>
  <g transform="translate(520, 180)">
    <rect x="0" y="0" width="100" height="40" rx="8" fill="#ffffff" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="50" y="20" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#04342C">retry + cb</text>
  </g>

  <!-- Checkpoint -->
  <g transform="translate(250, 235)">
    <rect x="0" y="0" width="180" height="30" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
    <text x="90" y="15" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#2C2C2A">sqlite 状态检查点 · 断点续传</text>
  </g>

  <!-- Layer 2: Orchestrator -->
  <g transform="translate(120, 295)">
    <rect x="0" y="0" width="180" height="40" rx="8" fill="#ffffff" stroke="#854F0B" stroke-width="0.5"/>
    <text x="90" y="20" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#412402">串行模式 · 主模型+fallback</text>
  </g>
  <g transform="translate(330, 295)">
    <rect x="0" y="0" width="220" height="40" rx="8" fill="#ffffff" stroke="#854F0B" stroke-width="0.5"/>
    <text x="110" y="20" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#412402">并行模式 · 多模型共识仲裁</text>
  </g>
  <g transform="translate(220, 340)">
    <rect x="0" y="0" width="240" height="28" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
    <text x="120" y="14" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#2C2C2A">限流感知 · 反爬退让 · 任务优先级队列</text>
  </g>

  <!-- Layer 3: Analyzer -->
  <g transform="translate(70, 410)">
    <rect x="0" y="0" width="100" height="40" rx="8" fill="#ffffff" stroke="#993556" stroke-width="0.5"/>
    <text x="50" y="20" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#4B1528">豆包</text>
  </g>
  <g transform="translate(190, 410)">
    <rect x="0" y="0" width="100" height="40" rx="8" fill="#ffffff" stroke="#993556" stroke-width="0.5"/>
    <text x="50" y="20" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#4B1528">kimi</text>
  </g>
  <g transform="translate(310, 410)">
    <rect x="0" y="0" width="100" height="40" rx="8" fill="#ffffff" stroke="#993556" stroke-width="0.5"/>
    <text x="50" y="20" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#4B1528">gemini</text>
  </g>
  <g transform="translate(430, 410)">
    <rect x="0" y="0" width="100" height="40" rx="8" fill="#ffffff" stroke="#993556" stroke-width="0.5"/>
    <text x="50" y="20" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#4B1528">claude</text>
  </g>
  <g transform="translate(550, 410)">
    <rect x="0" y="0" width="70" height="40" rx="8" fill="#ffffff" stroke="#993556" stroke-width="0.5"/>
    <text x="35" y="20" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#4B1528">审查</text>
  </g>
  <g transform="translate(160, 455)">
    <rect x="0" y="0" width="360" height="28" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
    <text x="180" y="14" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#2C2C2A">视觉定位 / 自然语言 fallback · selector 失效时自动适配</text>
  </g>

  <!-- Layer 4: Knowledge Builder -->
  <g transform="translate(70, 535)">
    <rect x="0" y="0" width="105" height="40" rx="8" fill="#ffffff" stroke="#534AB7" stroke-width="0.5"/>
    <text x="52" y="20" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#26215C">去重合并</text>
  </g>
  <g transform="translate(195, 535)">
    <rect x="0" y="0" width="105" height="40" rx="8" fill="#ffffff" stroke="#534AB7" stroke-width="0.5"/>
    <text x="52" y="20" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#26215C">层级分类</text>
  </g>
  <g transform="translate(320, 535)">
    <rect x="0" y="0" width="105" height="40" rx="8" fill="#ffffff" stroke="#534AB7" stroke-width="0.5"/>
    <text x="52" y="20" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#26215C">知识图谱</text>
  </g>
  <g transform="translate(445, 535)">
    <rect x="0" y="0" width="105" height="40" rx="8" fill="#ffffff" stroke="#534AB7" stroke-width="0.5"/>
    <text x="52" y="20" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#26215C">质量评分</text>
  </g>
  <g transform="translate(570, 535)">
    <rect x="0" y="0" width="60" height="40" rx="8" fill="#ffffff" stroke="#534AB7" stroke-width="0.5"/>
    <text x="30" y="20" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#26215C">qa</text>
  </g>
  <g transform="translate(120, 580)">
    <rect x="0" y="0" width="440" height="28" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
    <text x="220" y="14" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#2C2C2A">统一 schema v2 · 技能单元 · 前置依赖图 · 学习路径</text>
  </g>

  <!-- Layer 5: Sinks -->
  <g transform="translate(70, 675)">
    <rect x="0" y="0" width="110" height="40" rx="8" fill="#ffffff" stroke="#3B6D11" stroke-width="0.5"/>
    <text x="55" y="20" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#173404">乐享</text>
  </g>
  <g transform="translate(200, 675)">
    <rect x="0" y="0" width="110" height="40" rx="8" fill="#ffffff" stroke="#3B6D11" stroke-width="0.5"/>
    <text x="55" y="20" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#173404">notion</text>
  </g>
  <g transform="translate(330, 675)">
    <rect x="0" y="0" width="110" height="40" rx="8" fill="#ffffff" stroke="#3B6D11" stroke-width="0.5"/>
    <text x="55" y="20" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#173404">obsidian</text>
  </g>
  <g transform="translate(460, 675)">
    <rect x="0" y="0" width="110" height="40" rx="8" fill="#ffffff" stroke="#3B6D11" stroke-width="0.5"/>
    <text x="55" y="20" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#173404">markdown</text>
  </g>

  <!-- Bottom: Engineering guardrails -->
  <g transform="translate(30, 745)">
    <rect x="0" y="0" width="620" height="70" rx="12" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
    <text x="20" y="22" font-size="13" font-weight="500" fill="#444441">工程基座</text>
    <text x="20" y="48" font-size="12" fill="#5F5E5A">结构化日志 · 配置校验 · 单元/集成测试 · ci/cd · .env 模板 · 可观测埋点 · 版本化 adapter</text>
  </g>

  <!-- Arrows between layers -->
  <line x1="340" y1="100" x2="340" y2="125" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="340" y1="220" x2="340" y2="250" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="340" y1="350" x2="340" y2="365" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="340" y1="465" x2="340" y2="490" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="340" y1="620" x2="340" y2="635" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="340" y1="725" x2="340" y2="745" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>
</svg>